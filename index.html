<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿土伯投資儀表板 - WBC 賽事監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">📈 阿土伯多空戰情室</h1>
                <p class="text-slate-400 mt-2">最後更新：<span id="update-time">讀取中...</span></p>
            </div>
            
            <div class="mt-4 md:mt-0 flex gap-2">
                <input type="text" id="searchInput" placeholder="搜尋代號或名稱..." 
                       class="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                <select id="filterTrend" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2">
                    <option value="all">所有趨勢</option>
                    <option value="多頭">只看多頭</option>
                    <option value="空頭">只看空頭</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
    <div class="bg-slate-800/80 p-6 rounded-3xl text-center border-b-8 border-blue-500 shadow-2xl">
        <p class="text-slate-400 text-sm font-black mb-2 tracking-widest">📋 點名標的</p>
        <div class="flex items-baseline justify-center gap-1">
            <p id="total-count" class="text-6xl font-black text-white">-</p>
            <p class="text-slate-500 font-bold">台</p>
        </div>
        <p class="text-xs text-slate-500 mt-2 font-bold">目前口袋名單總數</p>
    </div>

    <div class="bg-slate-800/80 p-6 rounded-3xl text-center border-b-8 border-red-500 shadow-2xl">
        <p class="text-red-400 text-sm font-black mb-2 tracking-widest">🚀 準備起飛</p>
        <div class="flex items-baseline justify-center gap-1">
            <p id="bull-count" class="text-6xl font-black text-red-500">-</p>
            <p class="text-slate-500 font-bold">台</p>
        </div>
        <p class="text-xs text-red-900 mt-2 font-black uppercase">別擋路！這些車正在衝</p>
    </div>

    <div class="bg-slate-800/80 p-6 rounded-3xl text-center border-b-8 border-green-500 shadow-2xl">
        <p class="text-green-400 text-sm font-black mb-2 tracking-widest">🛡️ 休息站區</p>
        <div class="flex items-baseline justify-center gap-1">
            <p id="bear-count" class="text-6xl font-black text-green-500">-</p>
            <p class="text-slate-500 font-bold">台</p>
        </div>
        <p class="text-xs text-green-900 mt-2 font-black uppercase">先別急，等路修好再說</p>
    </div>
</div>

    <script>
        let rawData = [];

        function renderData(filterText = '') {
    const list = document.getElementById('stock-list');
    list.innerHTML = '';
    const search = filterText.toLowerCase();

    const filtered = rawData.filter(item => {
        return item.name.toLowerCase().includes(search) || 
               item.symbol.toLowerCase().includes(search) || 
               item.category.toLowerCase().includes(search);
    });

    if (filtered.length === 0 && search.length > 0) {
        list.innerHTML = `<div class="col-span-full text-center py-20 bg-slate-800 rounded-3xl border-2 border-dashed border-slate-600">
            <p class="text-3xl font-bold text-slate-400 mb-6">🔍 尚未監控「${search}」</p>
            <button onclick="window.open('https://www.google.com/search?q=${search}+stock+price+analysis', '_blank')" 
                    class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-10 rounded-full text-xl shadow-2xl transition-all">
                直接看 Google 即時分析
            </button>
        </div>`;
        return;
    }

    filtered.forEach(stock => {
        const card = document.createElement('div');
        // 點擊事件：直接看新聞分析
        card.onclick = () => window.open(`https://www.google.com/search?q=${stock.name}+${stock.symbol}+新聞+分析`, '_blank');
        
        card.className = "bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 hover:border-blue-400 cursor-pointer transition-all shadow-2xl transform hover:-translate-y-2";
        
        // 發光燈號邏輯
        const sL = stock.lights.short !== '⚪' ? 'text-red-500 drop-shadow-[0_0_8px_#ef4444] brightness-125' : 'text-slate-700 opacity-20';
        const mL = stock.lights.mid !== '⚪' ? 'text-yellow-400 drop-shadow-[0_0_8px_#facc15] brightness-125' : 'text-slate-700 opacity-20';
        const lL = stock.lights.long !== '⚪' ? 'text-green-500 drop-shadow-[0_0_8px_#22c55e] brightness-125' : 'text-slate-700 opacity-20';

        card.innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <span class="bg-blue-600/20 text-blue-400 text-xs px-3 py-1 rounded-full font-black border border-blue-400/30">${stock.category}</span>
                <div class="flex gap-3 text-2xl">
                    <span class="${sL}">🔴</span>
                    <span class="${mL}">🟡</span>
                    <span class="${lL}">🟢</span>
                </div>
            </div>
            
            <h2 class="text-4xl font-black mb-1 text-white">${stock.name}</h2>
            <p class="text-slate-500 font-mono text-lg mb-6 tracking-widest">${stock.symbol}</p>

            <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-700/50 mb-6">
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-5xl font-mono font-black text-white tracking-tighter">${stock.price}</p>
                        <p class="text-sm font-bold text-yellow-500 mt-3">💡 老司機點評：${stock.status}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-slate-500 font-black mb-1">熱度 (RSI)</p>
                        <p class="text-3xl font-mono font-black ${stock.rsi > 70 ? 'text-red-500' : 'text-green-400'}">${stock.rsi}</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 text-center text-[10px] font-black uppercase tracking-tighter">
                <div class="${stock.lights.short !== '⚪' ? 'text-red-400' : 'text-slate-600'}">🔴 起步加速</div>
                <div class="${stock.lights.mid !== '⚪' ? 'text-yellow-400' : 'text-slate-600'}">🟡 路況順暢</div>
                <div class="${stock.lights.long !== '⚪' ? 'text-green-400' : 'text-slate-600'}">🟢 地基穩固</div>
            </div>
        `;
        list.appendChild(card);
    });
}

        fetch('data.json')
            .then(res => res.json())
            .then(json => {
                rawData = json.data;
                document.getElementById('update-time').innerText = json.last_update;
                document.getElementById('total-count').innerText = rawData.length;
                document.getElementById('bull-count').innerText = rawData.filter(i => i.trend === '多頭').length;
                document.getElementById('bear-count').innerText = rawData.filter(i => i.trend === '空頭').length;
                renderData();
            });

        // 監聽搜尋與過濾
        document.getElementById('searchInput').addEventListener('input', (e) => renderData(e.target.value, document.getElementById('filterTrend').value));
        document.getElementById('filterTrend').addEventListener('change', (e) => renderData(document.getElementById('searchInput').value, e.target.value));
    </script>
</body>
</html>
