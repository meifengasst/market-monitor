<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿土伯投資儀表板 - 視覺化2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen overflow-x-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-900 transition-opacity duration-500">
        <div class="text-center mb-8"><div class="text-6xl mb-4">🕵️‍♂️</div><h1 class="text-4xl font-black text-blue-400 tracking-widest">阿土伯戰情室</h1><p class="text-slate-500 mt-2 font-bold tracking-widest">VISUAL 2.0</p></div>
        <div class="bg-slate-800 p-8 rounded-[2rem] shadow-2xl flex flex-col items-center w-11/12 max-w-sm"><input type="password" id="passInput" class="w-full bg-slate-900 rounded-xl px-5 py-4 text-center text-2xl tracking-[0.5em] focus:outline-none mb-6" placeholder="••••"><button onclick="checkPassword()" class="w-full bg-blue-600 font-black py-4 rounded-xl">解鎖</button><p id="errorMsg" class="text-red-400 font-bold mt-4 opacity-0 text-sm">密碼錯誤</p></div>
    </div>

    <div id="dashboardContent" class="hidden p-4 md:p-6 w-full max-w-[1800px] mx-auto flex-col xl:flex-row gap-6 opacity-0 transition-opacity duration-700">
        <aside class="w-full xl:w-[320px] xl:sticky xl:top-6 h-[calc(100vh-3rem)] overflow-y-auto bg-slate-800/60 rounded-[2rem] p-6 flex-shrink-0 custom-scrollbar">
            <h2 class="text-2xl font-black text-green-400 mb-4 border-b border-slate-700 pb-3">💼 目前實戰庫存</h2>
            <div id="portfolioList" class="flex flex-col gap-3"></div>
            <div class="mt-4 pt-3 border-t border-slate-700 flex justify-between"><p class="text-sm text-slate-400 font-bold">庫存總市值</p><p id="totalMarketValue" class="text-xl font-black">$0</p></div>
            <div class="mt-2 flex justify-between"><p class="text-sm text-slate-400 font-bold">未實現損益</p><p id="totalPnL" class="text-xl font-black">$0</p></div>
            <div class="mt-4 pt-3 border-t border-slate-700 flex justify-between"><p class="text-sm text-blue-400 font-bold">💎 動態總資產</p><p id="dynamicCapital" class="text-2xl font-black text-blue-400">$0</p></div>
            <button onclick="resetSystem()" class="w-full mt-8 bg-red-900/40 text-red-400 border border-red-500/30 font-black py-3 rounded-xl">⚠️ 一鍵重置</button>
        </aside>

        <main class="flex-1 w-full min-w-0">
            <header class="mb-6 flex justify-between border-b border-slate-700 pb-4">
                <div><h1 class="text-4xl font-black text-blue-400 tracking-tight">📈 阿土伯多空戰情室</h1><p class="text-slate-400 mt-2 font-bold">更新：<span id="update-time">讀取中...</span> <button onclick="triggerGitHubAction()" class="ml-2 bg-blue-600/20 px-2 py-1 rounded text-xs">🔄 強制更新</button></p></div>
                <input type="text" id="searchInput" placeholder="🔍 搜尋..." class="bg-slate-800 rounded-xl px-5 py-3 focus:outline-none">
            </header>

            <div class="mb-8 bg-slate-800/80 rounded-[2rem] p-6 shadow-2xl flex flex-col lg:flex-row gap-8 relative overflow-hidden">
                <div class="w-full lg:w-5/12 flex flex-col gap-6 border-b lg:border-r border-slate-700 pb-6 lg:pr-8">
                    <div><h3 class="text-blue-400 font-black tracking-widest mb-4">🦅 昨夜美股戰報</h3><div id="us-market-grid" class="grid grid-cols-2 gap-3"><p class="text-slate-500">讀取中...</p></div></div>
                    <div class="pt-4 border-t border-slate-700"><p class="text-xs text-slate-400 font-bold mb-2">🇹🇼 台股多頭指標 <span id="health-score" class="float-right text-white">--%</span></p><div class="w-full bg-slate-900 h-2.5 rounded-full"><div id="health-bar" class="h-full bg-blue-500" style="width: 0%;"></div></div></div>
                    <div class="pt-4 border-t border-slate-700"><h3 class="text-slate-300 font-bold text-xs tracking-widest mb-3">🧭 資金輪動雷達</h3><div id="sector-radar-container" class="grid grid-cols-2 gap-2"></div></div>
                </div>
                <div class="w-full lg:w-7/12"><h3 class="text-purple-400 font-black tracking-widest text-xl mb-5">🧠 阿土伯 AI 開盤劇本 <span class="bg-indigo-900/40 text-indigo-300 px-2 py-1 rounded-lg text-xs">Llama-3.3 核心</span></h3><div class="bg-black/40 p-6 rounded-2xl border border-white/5"><p id="ai-script-text" class="text-slate-300 text-lg font-bold leading-relaxed">正在解讀華爾街籌碼...</p></div></div>
            </div>

            <div id="stock-list" class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script>
        let rawData = []; let stockMap = {}; 
        let myPortfolio = JSON.parse(localStorage.getItem('atu_portfolio')) || {};
        let baseCapital = parseFloat(localStorage.getItem('atu_base_capital')) || 100000;
        let globalDynamicCapital = baseCapital; 
        let charts = {}; // 存放雷達圖實例

        const SECRET_PASSWORD = "29399909"; 
        function checkPassword() {
            if (document.getElementById('passInput').value === SECRET_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('dashboardContent').classList.remove('hidden'); document.getElementById('dashboardContent').classList.add('flex'); setTimeout(() => { document.getElementById('dashboardContent').classList.remove('opacity-0'); }, 50); loadData();
            } else { alert("密碼錯誤"); }
        }

        async function triggerGitHubAction() {
            let token = localStorage.getItem('atu_github_token');
            if (!token) { token = prompt("請輸入 GitHub Token："); if (!token) return; localStorage.setItem('atu_github_token', token); }
            try { await fetch(`https://api.github.com/repos/meifengasst/market-monitor/actions/workflows/main.yml/dispatches`, { method: 'POST', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ ref: 'main' }) }); alert("雲端運算已啟動，請稍候 30 秒後重整！"); } catch (e) { alert("呼叫失敗"); }
        }

        function resetSystem() {
            if(confirm("確定重置？")) { baseCapital = parseFloat(prompt("初始本金：", "100000")) || 100000; localStorage.setItem('atu_base_capital', baseCapital); myPortfolio = {}; localStorage.removeItem('atu_portfolio'); renderData(); renderPortfolioSummary(); }
        }

        function renderPortfolioSummary() {
            const listContainer = document.getElementById('portfolioList'); listContainer.innerHTML = '';
            let totalPnL = 0; let totalMarketValue = 0; 
            for (let symbol in myPortfolio) {
                let trade = myPortfolio[symbol]; let stock = stockMap[symbol];
                let currentPrice = stock ? stock.price : trade.entryPrice;
                let pnl = (currentPrice - trade.entryPrice) * trade.shares; totalPnL += pnl; totalMarketValue += currentPrice * trade.shares;
                listContainer.innerHTML += `<div class="p-3 bg-black/30 rounded-xl border border-slate-700 flex justify-between"><div><p class="font-bold text-white">${symbol}</p><p class="text-xs text-slate-400">均價 ${trade.entryPrice}</p></div><div class="text-right"><p class="font-mono ${pnl>=0?'text-red-400':'text-green-400'}">${pnl>0?'+':''}${Math.round(pnl)}</p></div></div>`;
            }
            document.getElementById('totalPnL').innerText = `${totalPnL>=0?'+':''}$${Math.round(totalPnL)}`; document.getElementById('totalPnL').className = `text-xl font-black ${totalPnL>=0?'text-red-400':'text-green-400'}`;
            document.getElementById('totalMarketValue').innerText = `$${Math.round(totalMarketValue)}`;
            globalDynamicCapital = baseCapital + totalPnL; document.getElementById('dynamicCapital').innerText = `$${Math.round(globalDynamicCapital)}`;
        }

        function renderData(filterText = '') {
            const list = document.getElementById('stock-list'); list.innerHTML = ''; 
            const search = filterText.toLowerCase().trim();
            const filtered = rawData.filter(item => (item.symbol||"").toLowerCase().includes(search) || (item.name||"").toLowerCase().includes(search));

            filtered.forEach(stock => {
                const card = document.createElement('div'); 
                let isBullish = stock.price > stock.best_ma_price;
                let badgeStyle = isBullish ? "bg-red-900/40 border-red-500 text-red-400" : "bg-green-900/40 border-green-500 text-green-400";
                
                // 📊 計算雷達圖 6 大維度分數 (0-100)
                let trendScore = isBullish ? 85 : 30;
                let momScore = Math.min(Math.max(50 + stock.rs_score * 2, 0), 100);
                let rsiScore = stock.rsi > 70 ? 20 : (stock.rsi < 30 ? 90 : 70);
                let pocDist = Math.abs((stock.price - stock.poc_price)/stock.poc_price)*100;
                let valScore = Math.max(100 - (pocDist * 2), 10);
                let smScore = stock.smart_money.includes("買") ? 90 : (stock.smart_money.includes("賣") ? 10 : 50);
                let riskScore = 100 - (stock.actual_sl * 5);
                
                let radarId = `radar-${stock.symbol.replace('.','')}`;
                let aiAction = stock.unified_brain ? stock.unified_brain.action : "觀望";
                let aiSummary = stock.unified_brain ? stock.unified_brain.summary : "等待 AI 分析...";
                let stopPrice = stock.unified_brain ? stock.unified_brain.stop_price : stock.price * 0.95;

                // 📏 安全水位計算 (0-100%)
                let maxPrice = Math.max(stock.price, stopPrice, stock.poc_price);
                let minPrice = Math.min(stock.price, stopPrice, stock.poc_price) * 0.9;
                let range = maxPrice - minPrice;
                let pricePos = ((stock.price - minPrice) / range) * 100;
                let stopPos = ((stopPrice - minPrice) / range) * 100;
                let pocPos = ((stock.poc_price - minPrice) / range) * 100;

                card.className = `p-5 rounded-[2rem] border-2 ${isBullish && stock.vol_ratio > 2 ? 'border-yellow-400 shadow-[0_0_30px_rgba(250,204,21,0.3)] bg-gradient-to-b from-slate-800 to-black' : 'border-slate-700 bg-slate-800/80'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-white/10 pb-3 mb-4">
                        <div class="flex items-center gap-3">
                            <h2 class="text-2xl font-black">${stock.name} <span class="text-xs text-slate-500 font-mono">${stock.symbol}</span></h2>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-black border ${badgeStyle}">${isBullish ? '🚀 偏多' : '🚨 偏空'}</span>
                    </div>
                    
                    <div class="flex justify-between items-end mb-4">
                        <div><p class="text-5xl font-mono font-black text-white">${stock.price}</p></div>
                        <div class="text-right"><p class="text-xs text-slate-400 font-bold mb-1">大戶動向</p><p class="text-sm font-bold ${smScore>60?'text-green-400':(smScore<40?'text-red-400':'text-slate-300')}">${stock.smart_money.substring(0,8)}...</p></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <div class="bg-black/30 rounded-2xl p-2 border border-white/5 h-[180px] relative">
                            <canvas id="${radarId}"></canvas>
                        </div>
                        
                        <div class="flex flex-col justify-between gap-3">
                            <div class="bg-indigo-900/30 border border-indigo-500/50 p-4 rounded-xl flex-1 flex flex-col justify-center">
                                <div class="flex items-center gap-2 mb-2"><span class="text-xl animate-pulse">🧠</span><span class="text-indigo-300 font-black text-sm">終極指令: ${aiAction}</span></div>
                                <p class="text-xs font-bold text-slate-300 leading-relaxed">${aiSummary}</p>
                            </div>
                            
                            <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                                <p class="text-[10px] text-slate-400 font-bold mb-2">🛡️ 防守縱深 (左到右)</p>
                                <div class="relative w-full h-2 bg-slate-700 rounded-full mb-3">
                                    <div class="absolute w-2 h-4 bg-purple-500 rounded -top-1" style="left: ${pocPos}%;" title="主力POC"></div>
                                    <div class="absolute w-2 h-4 bg-red-500 rounded -top-1" style="left: ${stopPos}%;" title="防守價"></div>
                                    <div class="absolute w-3 h-3 bg-green-400 rounded-full border border-white -top-0.5 shadow-[0_0_8px_rgba(74,222,128,1)]" style="left: ${pricePos}%;"></div>
                                </div>
                                <div class="flex justify-between text-[9px] font-black">
                                    <span class="text-purple-300">POC $${stock.poc_price}</span>
                                    <span class="text-red-400">防守 $${stopPrice}</span>
                                </div>
                            </div>
                        </div>

                    </div>
                `;
                list.appendChild(card);

                // 畫雷達圖
                setTimeout(() => {
                    if (charts[radarId]) charts[radarId].destroy();
                    charts[radarId] = new Chart(document.getElementById(radarId), {
                        type: 'radar',
                        data: {
                            labels: ['趨勢', '動能', '價值', '籌碼', '熱度', '安全'],
                            datasets: [{
                                data: [trendScore, momScore, valScore, smScore, rsiScore, riskScore],
                                backgroundColor: 'rgba(99, 102, 241, 0.3)', borderColor: 'rgba(99, 102, 241, 1)',
                                pointBackgroundColor: '#fff', borderWidth: 2, pointRadius: 2
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#94a3b8', font: { size: 10, weight: 'bold' } } } }, plugins: { legend: { display: false }, tooltip: {enabled: false} } }
                    });
                }, 100);
            });
        }

        function loadData() {
            fetch('data.json?t=' + new Date().getTime()).then(res => res.json()).then(json => {
                if (!json || !json.data) return;
                rawData = json.data; rawData.forEach(s => stockMap[s.symbol] = s);
                document.getElementById('update-time').innerText = json.last_update;
                if (json.market_health) {
                    let hd = json.market_health; document.getElementById('health-score').innerText = `${hd.health_pct}%`;
                    document.getElementById('health-bar').style.width = `${hd.health_pct}%`;
                    document.getElementById('ai-script-text').innerText = hd.ai_script || "無資料";
                    
                    let uGrid = document.getElementById('us-market-grid'); uGrid.innerHTML = '';
                    if (hd.us_summary) { for (let k in hd.us_summary) { let item = hd.us_summary[k]; uGrid.innerHTML += `<div class="p-3 bg-black/20 rounded-xl border border-white/5"><p class="text-xs text-slate-400">${k}</p><p class="text-lg font-black">${item.price} <span class="text-xs ${item.pct>0?'text-red-400':'text-green-400'}">${item.pct}%</span></p></div>`; } }
                    
                    let sGrid = document.getElementById('sector-radar-container'); sGrid.innerHTML = '';
                    if (hd.sector_data) { hd.sector_data.forEach(s => { sGrid.innerHTML += `<div class="flex justify-between items-center p-2 rounded-lg bg-black/20"><span class="text-xs text-slate-300">${s.name}</span><span class="text-xs font-black ${s.rs>0?'text-red-400':'text-green-400'}">${s.rs}%</span></div>`; }); }
                }
                renderData(); renderPortfolioSummary(); 
            }).catch(err => console.log("等待資料..."));
        }
        setInterval(() => loadData(), 60000);
        document.getElementById('searchInput').addEventListener('input', (e) => renderData(e.target.value));
    </script>
</body>
</html>
