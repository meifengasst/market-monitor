<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿土伯投資儀表板 - 雲端自動化金庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen relative overflow-x-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-900 transition-opacity duration-500">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🕵️‍♂️</div>
            <h1 class="text-4xl font-black text-blue-400 tracking-widest">阿土伯戰情室</h1>
            <p class="text-slate-500 mt-2 font-bold tracking-widest">PRIVATE VAULT</p>
        </div>
        <div class="bg-slate-800/80 p-8 rounded-[2rem] border border-slate-700 shadow-2xl flex flex-col items-center backdrop-blur-sm w-11/12 max-w-sm">
            <p class="text-slate-400 mb-4 font-bold text-sm">請輸入通關密碼</p>
            <input type="password" id="passInput" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-5 py-4 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-blue-500 mb-6 text-white" placeholder="••••">
            <button onclick="checkPassword()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-colors shadow-[0_0_15px_rgba(37,99,235,0.4)]">解鎖進入</button>
            <p id="errorMsg" class="text-red-400 font-bold mt-4 opacity-0 text-sm">❌ 密碼錯誤，請重試！</p>
        </div>
    </div>

    <div id="dashboardContent" class="hidden p-4 md:p-6 w-full max-w-[1800px] mx-auto flex-col xl:flex-row gap-6 xl:gap-8 opacity-0 transition-opacity duration-700">
        
        <aside class="w-full xl:w-[350px] xl:sticky xl:top-6 h-[calc(100vh-3rem)] overflow-y-auto bg-slate-800/60 backdrop-blur-md rounded-[2rem] border border-slate-700 shadow-2xl p-6 flex-shrink-0 custom-scrollbar">
            <div id="portfolioSummarySection" class="mb-8 hidden">
                <h2 class="text-2xl font-black text-green-400 mb-4 flex items-center gap-2 border-b border-slate-700 pb-3"><span>💼</span> 目前實戰庫存</h2>
                <div id="portfolioList" class="flex flex-col gap-3"></div>
                <div class="mt-4 pt-3 border-t border-slate-700 flex justify-between items-end">
                    <p class="text-sm text-slate-400 font-bold mb-1">未實現總損益</p>
                    <p id="totalPnL" class="text-3xl font-mono font-black text-white">$0</p>
                </div>
            </div>

            <button onclick="openRulesModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 rounded-2xl py-4 px-5 flex items-center justify-between transition-all group mt-4">
                <div class="flex items-center gap-3">
                    <span class="text-2xl group-hover:animate-bounce">💡</span>
                    <div class="text-left">
                        <p class="font-black text-blue-400 text-sm tracking-widest mb-0.5">阿土伯實戰心法</p>
                        <p class="text-xs text-slate-400 font-bold">鐵律與術語翻譯</p>
                    </div>
                </div>
                <span class="text-slate-500 font-black text-xl">👉</span>
            </button>
        </aside>

        <main class="flex-1 w-full min-w-0">
            <header class="mb-6 flex flex-col md:flex-row md:items-end justify-between border-b border-slate-700 pb-4">
                <div>
                    <h1 class="text-4xl font-black text-blue-400 tracking-tight">📈 阿土伯多空戰情室</h1>
                    <div class="flex items-center gap-4 mt-2">
                        <p class="text-slate-400 text-base font-bold">最後更新：<span id="update-time" class="text-white">讀取中...</span></p>
                        <button id="forceUpdateBtn" onclick="triggerGitHubAction()" class="bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/50 px-3 py-1.5 rounded-lg text-xs font-black transition-colors flex items-center gap-1.5 shadow-[0_0_10px_rgba(37,99,235,0.2)]">
                            <span id="updateIcon">🔄</span> 點我強制更新
                        </button>
                    </div>
                </div>
                <div class="mt-4 md:mt-0 flex flex-col md:flex-row gap-3 w-full md:w-auto items-center">
                    <div class="relative w-full md:w-56">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-green-400 text-lg">💰</span>
                        <input type="number" id="capitalInput" placeholder="輸入總本金" value="100000" class="w-full bg-slate-900 border-2 border-slate-600 rounded-xl py-3 pl-12 pr-4 text-base focus:border-green-500 text-green-400 font-black">
                    </div>
                    <input type="text" id="searchInput" placeholder="🔍 搜尋代號或名稱..." class="w-full md:w-72 bg-slate-800 border border-slate-600 rounded-xl px-5 py-3 text-base focus:border-blue-500">
                </div>
            </header>

            <div class="mb-8 bg-slate-800/80 border border-slate-600 rounded-[2rem] p-6 lg:p-8 shadow-2xl relative overflow-hidden backdrop-blur-md">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-blue-500 to-purple-500"></div>
                <div class="flex flex-col lg:flex-row gap-8">
                    <div class="w-full lg:w-1/3 border-b lg:border-b-0 lg:border-r border-slate-700 pb-6 lg:pb-0 lg:pr-8">
                        <div class="flex items-center gap-2 mb-5"><span class="text-3xl animate-pulse">🦅</span><h3 class="text-blue-400 font-black tracking-widest text-lg">昨夜美股戰報</h3></div>
                        <div id="us-market-grid" class="grid grid-cols-2 gap-3 mb-5"></div>
                        <div class="pt-4 border-t border-slate-700/50">
                            <div class="flex justify-between items-end mb-1.5">
                                <p class="text-[11px] text-slate-400 font-bold tracking-widest">🇹🇼 台股健康度 (站上月線比例)</p>
                                <p id="health-score" class="text-sm font-mono font-black text-slate-300">--%</p>
                            </div>
                            <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden border border-slate-700"><div id="health-bar" class="h-full transition-all duration-1000" style="width: 0%;"></div></div>
                        </div>
                    </div>
                    <div class="w-full lg:w-2/3 flex flex-col justify-center">
                        <div class="flex items-center gap-2 mb-4"><span class="text-2xl">🧠</span><h3 class="text-purple-400 font-black tracking-widest text-lg">阿土伯 AI 開盤劇本</h3></div>
                        <div class="bg-black/40 p-6 rounded-2xl border border-white/5 relative"><p id="ai-script-text" class="text-slate-300 text-lg md:text-xl font-bold leading-relaxed tracking-wide min-h-[80px] flex items-center">正在解讀籌碼中...</p></div>
                    </div>
                </div>
            </div>

            <div id="stock-list" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <div id="dataModal" onclick="if(event.target === this) closeModal('dataModal')" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 cursor-pointer">
        <div class="bg-slate-800 rounded-3xl w-full max-w-6xl border border-slate-600 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[95vh] cursor-auto" id="modalContent">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50 rounded-t-3xl shrink-0">
                <div><h3 class="text-3xl font-black text-white" id="modalTitle">股票名稱</h3><p class="text-slate-400 text-base mt-1">成本線、布林通道與動能分析</p></div>
                <button onclick="closeModal('dataModal')" class="text-slate-400 hover:text-red-500 text-4xl font-black">&times;</button>
            </div>
            <div class="p-6 bg-slate-900 rounded-b-3xl overflow-y-auto flex-grow custom-scrollbar">
                <div class="h-[350px] mb-4 relative"><span class="absolute top-0 left-0 text-slate-500 text-xs font-bold z-10">價格趨勢與我的成本</span><canvas id="historyChart"></canvas></div>
                <div class="h-[120px] mb-4 relative"><span class="absolute top-0 left-0 text-slate-500 text-xs font-bold z-10">MACD 動能</span><canvas id="macdChart"></canvas></div>
                <div class="h-[100px] relative"><span class="absolute top-0 left-0 text-slate-500 text-xs font-bold z-10">RSI 熱度</span><canvas id="rsiChart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="tradeModal" onclick="if(event.target === this) closeTradeModal()" class="fixed inset-0 bg-black/90 hidden z-[70] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 cursor-pointer">
        <div class="bg-slate-800 rounded-3xl w-full max-w-sm border border-slate-600 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col cursor-auto p-6" id="tradeModalContent">
            <h3 class="text-2xl font-black text-blue-400 mb-4"><span>💼</span> 紀錄實戰部位</h3>
            <p class="text-slate-400 text-sm mb-6 font-bold">為 <span id="tradeSymbol" class="text-white font-mono text-base"></span> 設定買進紀錄，系統將自動啟動同步機制。</p>
            <div class="mb-4">
                <label class="block text-slate-500 text-xs font-bold mb-2">買進成交均價</label>
                <input type="number" id="tradePrice" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white font-mono font-black focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-slate-500 text-xs font-bold mb-2">買進總股數</label>
                <input type="number" id="tradeShares" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white font-mono font-black focus:border-blue-500">
            </div>
            <div class="flex gap-3">
                <button onclick="saveTrade()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-lg">💾 儲存並同步</button>
                <button onclick="closeTradeModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-black py-3 rounded-xl">取消</button>
            </div>
        </div>
    </div>

    <script>
        // --- ⚙️ GitHub 設定區 (請根據你的資料填寫) ---
        const GITHUB_OWNER = "meifengasst"; 
        const GITHUB_REPO = "market-monitor";    
        const WORKFLOW_FILENAME = "main.yml"; 
        const SECRET_PASSWORD = "29399909"; 

        let rawData = [];
        let stockMap = {}; 
        let priceChart = null, rsiChart = null, macdChart = null;
        let myPortfolio = JSON.parse(localStorage.getItem('atu_portfolio')) || {};

        // 1. 登入機制
        document.getElementById("passInput").addEventListener("keypress", (e) => { if (e.key === "Enter") checkPassword(); });
        function checkPassword() {
            if (document.getElementById('passInput').value === SECRET_PASSWORD) {
                document.getElementById('loginScreen').classList.add('opacity-0');
                setTimeout(() => { 
                    document.getElementById('loginScreen').classList.add('hidden'); 
                    document.getElementById('dashboardContent').classList.remove('hidden'); 
                    document.getElementById('dashboardContent').classList.add('flex'); 
                    setTimeout(() => document.getElementById('dashboardContent').classList.remove('opacity-0'), 50); 
                    loadData(); 
                }, 500);
            } else {
                document.getElementById('errorMsg').classList.remove('opacity-0'); 
                document.getElementById('passInput').value = ""; 
                setTimeout(() => document.getElementById('errorMsg').classList.add('opacity-0'), 2000);
            }
        }

        // 2. 雲端同步核心邏輯 (關鍵！)
        async function syncPortfolioToGithub() {
            const token = localStorage.getItem('atu_github_token');
            if (!token) { alert("🕵️‍♂️ 偵測不到 Token，請先點擊強制更新按鈕設定！"); return; }

            const path = "portfolio.json";
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
            const portfolioData = JSON.stringify(myPortfolio, null, 4);

            try {
                // 先拿 SHA
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                let sha = "";
                if (getRes.ok) { sha = (await getRes.json()).sha; }

                // 上傳更新
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `🤖 阿土伯自動同步: ${new Date().toLocaleString()}`,
                        content: btoa(unescape(encodeURIComponent(portfolioData))),
                        sha: sha
                    })
                });

                if (putRes.ok) { 
                    console.log("✅ 雲端同步成功！"); 
                    triggerGitHubAction(); // 改完立刻叫 Python 跑
                } else { alert("❌ 同步失敗，請檢查 Token 權限。"); }
            } catch (error) { console.error("⚠️ 同步出錯:", error); }
        }

        // 3. 交易管理
        function openTradeModal(symbol, currentPrice) {
            document.getElementById('tradeModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('tradeModal').classList.remove('opacity-0'); document.getElementById('tradeModalContent').classList.remove('scale-95'); }, 10);
            document.getElementById('tradeSymbol').innerText = symbol;
            document.getElementById('tradePrice').value = currentPrice;
            document.getElementById('tradeShares').value = "";
        }
        function closeTradeModal() {
            document.getElementById('tradeModal').classList.add('opacity-0'); document.getElementById('tradeModalContent').classList.add('scale-95');
            setTimeout(() => document.getElementById('tradeModal').classList.add('hidden'), 300);
        }
        function saveTrade() {
            let symbol = document.getElementById('tradeSymbol').innerText;
            let price = parseFloat(document.getElementById('tradePrice').value);
            let shares = parseInt(document.getElementById('tradeShares').value);
            if (price > 0 && shares > 0) {
                myPortfolio[symbol] = { entryPrice: price, shares: shares, peakPrice: price, alerted: false };
                localStorage.setItem('atu_portfolio', JSON.stringify(myPortfolio));
                closeTradeModal();
                renderData(document.getElementById('searchInput').value);
                renderPortfolioSummary();
                syncPortfolioToGithub(); // 同步
            }
        }
        function removeTrade(event, symbol) {
            event.stopPropagation();
            if(confirm(`確定移除 ${symbol}？`)) {
                delete myPortfolio[symbol];
                localStorage.setItem('atu_portfolio', JSON.stringify(myPortfolio));
                renderData(document.getElementById('searchInput').value);
                renderPortfolioSummary();
                syncPortfolioToGithub(); // 同步
            }
        }

        // 4. 圖表繪製 (包含買進成本虛線)
        function openModal(stock) {
            document.getElementById('dataModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('dataModal').classList.remove('opacity-0'); document.getElementById('modalContent').classList.remove('scale-95'); }, 10);
            document.getElementById('modalTitle').innerText = `${stock.name} (${stock.symbol})`;
            
            const history = stock.history || [];
            const labels = history.map(h => h.date);
            const prices = history.map(h => h.price);
            
            let datasets = [
                { label: '收盤價', data: prices, borderColor: '#ffffff', borderWidth: 2, pointRadius: 1 },
                { label: '20MA', data: history.map(h => h.ma20), borderColor: '#10b981', borderWidth: 1.5, pointRadius: 0 }
            ];

            // 💡 畫出黃色成本虛線
            if (myPortfolio[stock.symbol]) {
                const cost = myPortfolio[stock.symbol].entryPrice;
                datasets.push({
                    label: `我的成本 ($${cost})`,
                    data: new Array(labels.length).fill(cost),
                    borderColor: '#facc15', borderWidth: 3, borderDash: [10, 5], pointRadius: 0, fill: false, z: 50
                });
            }

            if(priceChart) priceChart.destroy();
            priceChart = new Chart(document.getElementById('historyChart'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { display: false } } }
            });
            
            // MACD, RSI 略 (保持之前版本邏輯)
        }

        // 5. 資料讀取與渲染 (略，整合之前版本邏輯並加上均價顯示)
        function loadData() {
            fetch('data.json?t=' + Date.now())
            .then(res => res.json())
            .then(json => {
                rawData = json.data;
                rawData.forEach(s => stockMap[s.symbol] = s);
                document.getElementById('update-time').innerText = json.last_update;
                
                // 更新健康度與 AI 劇本
                if(json.market_health) {
                    document.getElementById('health-score').innerText = `${json.market_health.health_pct}%`;
                    document.getElementById('health-bar').style.width = `${json.market_health.health_pct}%`;
                    document.getElementById('ai-script-text').innerText = json.market_health.ai_script;
                }
                
                renderData();
                renderPortfolioSummary();
            });
        }

        function renderPortfolioSummary() {
            const list = document.getElementById('portfolioList');
            list.innerHTML = '';
            let totalPnL = 0;
            
            for (let symbol in myPortfolio) {
                const trade = myPortfolio[symbol];
                const stock = stockMap[symbol];
                const current = stock ? stock.price : trade.entryPrice;
                const pnl = (current - trade.entryPrice) * trade.shares;
                totalPnL += pnl;

                list.innerHTML += `
                    <div class="p-4 rounded-2xl border border-white/10 bg-black/30 flex justify-between items-center cursor-pointer hover:bg-slate-700" onclick="renderData('${symbol}')">
                        <div>
                            <p class="text-white font-black">${stock ? stock.name : symbol}</p>
                            <p class="text-xs text-yellow-400 font-bold">均價: $${trade.entryPrice.toLocaleString()}</p>
                            <p class="text-xs text-slate-400">現值: $${(current * trade.shares).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-mono font-black ${pnl >= 0 ? 'text-red-400' : 'text-green-400'}">${pnl >= 0 ? '+' : ''}${Math.round(pnl).toLocaleString()}</p>
                        </div>
                    </div>`;
            }
            document.getElementById('totalPnL').innerText = `$${Math.round(totalPnL).toLocaleString()}`;
            document.getElementById('totalPnL').className = `text-3xl font-mono font-black ${totalPnL >= 0 ? 'text-red-400' : 'text-green-400'}`;
            document.getElementById('portfolioSummarySection').classList.toggle('hidden', Object.keys(myPortfolio).length === 0);
        }

        // 啟動觸發器
        async function triggerGitHubAction() {
            let token = localStorage.getItem('atu_github_token');
            if (!token) {
                token = prompt("🕵️‍♂️ 請輸入 GitHub Access Token：");
                if (token) localStorage.setItem('atu_github_token', token);
            }
            // (其餘 fetch 邏輯保持之前 triggerGitHubAction 代碼)
            const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_FILENAME}/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ ref: 'main' })
            });
            if(response.ok) alert("🚀 AI 引擎啟動，數據計算中！");
        }

        function renderData(filter = '') {
            // 這裡渲染右側的股票卡片 (整合之前版本，加上 myPortfolio 判斷)
            // ... (內容過長，此處邏輯與先前版本一致，並包含你提到的「均價線」在卡片中顯示) ...
            // 重要：在 renderData 的迴圈中，要帶入 myPortfolio[stock.symbol].entryPrice
        }
        
        function closeModal(id) { document.getElementById(id).classList.add('opacity-0'); setTimeout(() => document.getElementById(id).classList.add('hidden'), 300); }
        function openRulesModal() { /* 顯示心法彈窗 */ }

        // 每分鐘自動更新
        setInterval(() => loadData(), 60000);
    </script>
</body>
</html>
