<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿土伯投資儀表板 - 像素勇者版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        /* 🎮 全局像素風格設定 */
        * {
            font-family: 'DotGothic16', sans-serif !important;
            border-radius: 0px !important; /* 強制移除所有圓角 */
        }
        body {
            background-color: #0f172a;
            color: #ffffff;
        }
        /* 像素風容器 */
        .pixel-box {
            background-color: #1e293b;
            border: 4px solid #ffffff;
            box-shadow: 8px 8px 0px #000000;
        }
        /* 像素風卡片 */
        .pixel-card {
            background-color: #1e293b;
            border: 4px solid #ffffff;
            box-shadow: 6px 6px 0px #000000;
            transition: all 0.1s;
        }
        .pixel-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px #000000;
        }
        /* 像素風按鈕 */
        .pixel-btn {
            background-color: #2563eb;
            color: white !important;
            border: 3px solid #ffffff;
            box-shadow: 4px 4px 0px #000000;
            transition: all 0.05s;
        }
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000000;
        }
        /* RPG 對話框風格 */
        .pixel-dialog {
            background-color: #0f172a;
            border: 2px solid #64748b;
            padding: 8px;
            position: relative;
        }
        .pixel-dialog::after {
            content: "▼";
            position: absolute;
            bottom: 4px;
            right: 8px;
            font-size: 10px;
            animation: bounce 0.6s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border: 2px solid #000; }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden p-4 md:p-8">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-900 transition-opacity duration-500">
        <div class="pixel-box p-12 text-center max-w-sm w-11/12">
            <div class="text-6xl mb-6">🕵️‍♂️</div>
            <h1 class="text-3xl font-black text-blue-400 mb-2">阿土伯戰情室</h1>
            <p class="text-slate-500 mb-8 text-xs tracking-widest">--- PRIVATE VAULT ---</p>
            <p class="text-white text-sm mb-2">PASSKEY:</p>
            <input type="password" id="passInput" class="w-full bg-black border-2 border-slate-600 p-3 text-center text-2xl mb-6 text-white focus:outline-none focus:border-blue-500" placeholder="••••">
            <button onclick="checkPassword()" class="pixel-btn w-full py-3 font-bold">START GAME</button>
            <p id="errorMsg" class="text-red-500 font-bold mt-4 opacity-0 text-sm">!! WRONG PASSWORD !!</p>
        </div>
    </div>

    <div id="dashboardContent" class="hidden w-full max-w-[1800px] mx-auto flex-col xl:flex-row gap-8 opacity-0 transition-opacity duration-700">
        
        <aside class="w-full xl:w-[320px] xl:sticky xl:top-8 h-fit max-h-[90vh] overflow-y-auto pixel-box p-6 custom-scrollbar">
            <div id="portfolioSummarySection" class="mb-8 hidden">
                <h2 class="text-xl font-black text-green-400 mb-4 flex items-center gap-2 border-b-2 border-slate-700 pb-2">💼 英雄部位</h2>
                <div id="portfolioList" class="flex flex-col gap-4"></div>
                <div class="mt-6 pt-4 border-t-2 border-slate-700">
                    <p class="text-xs text-slate-400 mb-1">TOTAL GOLD (損益)</p>
                    <p id="totalPnL" class="text-2xl font-black text-white">$0 元</p>
                </div>
            </div>

            <h2 class="text-xl font-black text-blue-400 mb-4 border-b-2 border-slate-700 pb-2">📜 勇者鐵律</h2>
            <div class="bg-red-900/20 p-4 border-2 border-red-900 text-xs leading-relaxed">
                <p class="text-red-400 font-bold mb-2">進出原則:</p>
                1. 站上 20MA 才做多<br>
                2. 跌破 20MA 絕不接刀<br>
                3. 跌破 DEF 防線無條件撤退
            </div>
        </aside>

        <main class="flex-1 min-w-0">
            <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between border-b-4 border-slate-700 pb-6">
                <div>
                    <h1 class="text-4xl font-black text-blue-400">🕹️ 阿土伯戰情室 <span class="text-xs bg-blue-600 text-white px-2 py-0.5 ml-2">Ver 2.0</span></h1>
                    <div class="flex items-center gap-6 mt-4">
                        <p class="text-slate-400 text-sm">UPDATE: <span id="update-time" class="text-white">WAITING...</span></p>
                        <button id="forceUpdateBtn" onclick="triggerGitHubAction()" class="pixel-btn px-4 py-2 text-xs font-bold">
                            🔄 RELOAD (START)
                        </button>
                    </div>
                </div>
                <div class="mt-6 md:mt-0 flex flex-col md:flex-row gap-4 items-center">
                    <div class="relative w-full md:w-56">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-green-400">💰</span>
                        <input type="number" id="capitalInput" value="100000" class="w-full bg-black border-2 border-slate-600 py-3 pl-12 pr-4 text-green-400 font-black focus:outline-none focus:border-green-500">
                    </div>
                    <input type="text" id="searchInput" placeholder="SEARCH ITEM..." class="w-full md:w-72 bg-slate-800 border-2 border-slate-600 px-5 py-3 focus:outline-none focus:border-blue-500">
                </div>
            </header>

            <div class="mb-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="pixel-card p-6 border-l-8 border-l-emerald-500">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-emerald-400 font-black text-lg">🇹🇼 台股多空溫度</h3>
                        <span id="macro-tw" class="text-[10px] px-2 py-1 border-2 font-black">讀取中</span>
                    </div>
                    <div class="flex justify-between mb-2">
                        <p class="text-slate-400 text-xs">站上月線比例</p>
                        <span id="health-score" class="text-2xl font-black">--%</span>
                    </div>
                    <div class="w-full bg-black h-4 border-2 border-slate-700 p-0.5">
                        <div id="health-bar" class="h-full bg-emerald-500 transition-all duration-1000" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="pixel-card p-6 border-l-8 border-l-blue-500">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-blue-400 font-black text-lg">🌎 華爾街恐慌指數</h3>
                        <span id="macro-us" class="text-[10px] px-2 py-1 border-2 font-black">讀取中</span>
                    </div>
                    <div class="flex justify-between mb-2">
                        <p id="vix-desc" class="text-slate-400 text-xs">情緒評估中...</p>
                        <span id="vix-score" class="text-2xl font-black text-yellow-400">--</span>
                    </div>
                    <div class="w-full bg-black h-4 border-2 border-slate-700 relative">
                        <div class="absolute inset-0 bg-gradient-to-r from-red-500 via-yellow-500 to-green-500 opacity-30"></div>
                        <div id="vix-pointer" class="absolute top-0 bottom-0 w-2 bg-white shadow-[0_0_8px_white] transition-all duration-1000" style="left: 50%;"></div>
                    </div>
                </div>
            </div>

            <div id="stock-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </main>
    </div>

    <div id="dataModal" onclick="if(event.target === this) closeModal('dataModal')" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="pixel-box w-full max-w-6xl p-6 flex flex-col max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b-2 border-slate-700 pb-4">
                <h3 id="modalTitle" class="text-2xl font-black">DATA</h3>
                <button onclick="closeModal('dataModal')" class="text-slate-400 hover:text-white text-3xl">×</button>
            </div>
            <div class="space-y-8 bg-black p-4">
                <div class="h-[300px]"><canvas id="historyChart"></canvas></div>
                <div class="h-[120px]"><canvas id="macdChart"></canvas></div>
                <div class="h-[100px]"><canvas id="rsiChart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="tradeModal" onclick="if(event.target === this) closeTradeModal()" class="fixed inset-0 bg-black/90 hidden z-[70] flex items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="pixel-box w-full max-w-sm p-8">
            <h3 class="text-xl font-black text-blue-400 mb-6">💼 紀錄裝備</h3>
            <div class="space-y-6">
                <div><p class="text-xs text-slate-500 mb-2">成交均價</p><input type="number" id="tradePrice" class="w-full bg-black border-2 border-white p-3 font-mono"></div>
                <div><p class="text-xs text-slate-500 mb-2">買進股數</p><input type="number" id="tradeShares" class="w-full bg-black border-2 border-white p-3 font-mono"></div>
                <div class="flex gap-4 pt-4">
                    <button onclick="saveTrade()" class="pixel-btn flex-1 py-3 font-black bg-blue-600">SAVE</button>
                    <button onclick="closeTradeModal()" class="pixel-btn flex-1 py-3 font-black bg-slate-700">CANCEL</button>
                </div>
            </div>
            <p id="tradeSymbol" class="hidden"></p>
        </div>
    </div>

    <script>
        let rawData = [];
        let stockMap = {}; 
        let priceChart = null; let rsiChart = null; let macdChart = null;
        let myPortfolio = JSON.parse(localStorage.getItem('atu_portfolio')) || {};

        const SECRET_PASSWORD = "29399909"; 
        function checkPassword() {
            if (document.getElementById('passInput').value === SECRET_PASSWORD) {
                document.getElementById('loginScreen').classList.add('opacity-0');
                setTimeout(() => { 
                    document.getElementById('loginScreen').classList.add('hidden'); 
                    document.getElementById('dashboardContent').classList.replace('hidden', 'flex'); 
                    setTimeout(() => document.getElementById('dashboardContent').classList.add('opacity-100'), 50);
                    loadData(); 
                }, 500);
            } else {
                document.getElementById('errorMsg').style.opacity = 1; 
                setTimeout(() => document.getElementById('errorMsg').style.opacity = 0, 2000);
            }
        }

        function loadData(isAutoRefresh = false) {
            fetch('data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(json => {
                rawData = json.data;
                rawData.forEach(s => stockMap[s.symbol] = s);
                document.getElementById('update-time').innerText = json.last_update;

                if (json.macro) { 
                    const tw = document.getElementById('macro-tw');
                    const us = document.getElementById('macro-us');
                    tw.innerText = json.macro.tw_insight || "NORMAL";
                    us.innerText = json.macro.us_insight || "NORMAL";
                    tw.className = tw.innerText.includes('⚠️') ? "text-[10px] px-2 py-1 border-2 font-black bg-green-900 text-green-400 animate-pulse border-green-400" : "text-[10px] px-2 py-1 border-2 font-black border-red-900 text-red-400";
                    us.className = us.innerText.includes('⚠️') ? "text-[10px] px-2 py-1 border-2 font-black bg-green-900 text-green-400 animate-pulse border-green-400" : "text-[10px] px-2 py-1 border-2 font-black border-red-900 text-red-400";
                }
                
                if (json.market_health) {
                    let h = json.market_health;
                    document.getElementById('health-score').innerText = `${h.health_pct}%`;
                    document.getElementById('health-bar').style.width = `${h.health_pct}%`;
                    document.getElementById('vix-score').innerText = h.vix;
                    let vixPos = Math.min(Math.max((h.vix - 10) / 25 * 100, 0), 100); 
                    document.getElementById('vix-pointer').style.left = `${vixPos}%`;
                    document.getElementById('vix-desc').innerText = h.vix >= 25 ? "!! 華爾街極度恐慌 !!" : "情緒平穩";
                }

                renderData(document.getElementById('searchInput').value);
                renderPortfolioSummary(); 
            });
        }

        function renderPortfolioSummary() {
            const list = document.getElementById('portfolioList');
            const totalPnLDisp = document.getElementById('totalPnL');
            const section = document.getElementById('portfolioSummarySection');
            if (Object.keys(myPortfolio).length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            list.innerHTML = '';
            
            let totalPnL = 0;
            let totalRisk = 0;
            let cap = parseFloat(document.getElementById('capitalInput').value) || 100000;

            for (let sym in myPortfolio) {
                let trade = myPortfolio[sym];
                let s = stockMap[sym];
                let cur = s ? s.price : trade.entryPrice;
                let peak = trade.peakPrice || trade.entryPrice;
                if (cur > peak) { trade.peakPrice = cur; trade.peakPrice = cur; }
                
                let sl = s ? s.actual_sl / 100 : 0.05;
                let def = Math.max(trade.entryPrice * (1-sl), peak * (1-sl));
                let isDead = cur <= def;
                
                let pnl = (cur - trade.entryPrice) * trade.shares;
                totalPnL += pnl;
                totalRisk += (Math.max(0, trade.entryPrice - def) * trade.shares);

                list.innerHTML += `
                <div class="p-3 border-2 ${isDead ? 'bg-green-900 border-green-400 animate-pulse shadow-[4px_4px_0px_#14532d]' : 'bg-slate-900 border-white shadow-[4px_4px_0px_#000]'} cursor-pointer" onclick="document.getElementById('searchInput').value='${sym}'; renderData('${sym}');">
                    <p class="text-sm font-black">▶ ${s ? s.name : sym} ${isDead ? '!! DEAD !!' : ''}</p>
                    <p class="text-[10px] text-blue-300 mt-1">QTY: ${trade.shares.toLocaleString()} / VAL: $${Math.round(cur * trade.shares).toLocaleString()}</p>
                    <p class="text-sm font-black mt-1 ${pnl >= 0 ? 'text-red-400' : 'text-green-400'}">${pnl >= 0 ? '+' : ''}$${Math.round(pnl).toLocaleString()} 元</p>
                </div>`;
            }

            totalPnLDisp.className = `text-2xl font-black ${totalPnL >= 0 ? 'text-red-400' : 'text-green-400'}`;
            totalPnLDisp.innerText = `${totalPnL >= 0 ? '+' : ''}${Math.round(totalPnL).toLocaleString()} 元`;

            let rS = document.getElementById('riskExposureSection');
            if(!rS) {
                totalPnLDisp.insertAdjacentHTML('afterend', `<div id="riskExposureSection" class="mt-4"><p class="text-[10px] text-slate-500 mb-1">RISK EXPOSURE (MAX 10%)</p><div class="w-full bg-black h-2 border border-slate-700"><div id="riskBar" class="h-full bg-blue-500"></div></div></div>`);
            }
            let rPct = (totalRisk / cap) * 100;
            document.getElementById('riskBar').style.width = `${Math.min(rPct*10, 100)}%`;
            document.getElementById('riskBar').className = `h-full ${rPct > 8 ? 'bg-green-500' : 'bg-blue-500'}`;
        }

        function renderData(filter = '') {
            const list = document.getElementById('stock-list');
            list.innerHTML = '';
            const f = filter.toLowerCase().trim();
            const filtered = rawData.filter(i => i.symbol.toLowerCase().includes(f) || i.name.toLowerCase().includes(f));

            filtered.forEach(s => {
                const card = document.createElement('div');
                card.onclick = () => openModal(s);
                const ma20 = s.history[s.history.length-1].ma20;
                let isUp = s.price > ma20;
                
                let posHtml = "";
                if (myPortfolio[s.symbol]) {
                    let t = myPortfolio[s.symbol];
                    let def = Math.max(t.entryPrice * (1 - s.actual_sl/100), (t.peakPrice || t.entryPrice) * (1 - s.actual_sl/100)).toFixed(2);
                    let isDead = s.price <= parseFloat(def);
                    posHtml = `
                    <div class="mt-4 border-2 border-white p-3 ${isDead ? 'bg-green-600 animate-pulse' : 'bg-slate-800'}">
                        <div class="flex justify-between border-b border-white/20 pb-1 mb-2">
                            <span class="text-[10px] text-blue-300">EQUIPMENT</span>
                            <span class="text-xs">${t.shares.toLocaleString()}股</span>
                        </div>
                        <p class="text-xs">DEF 防線: ${def}</p>
                        ${isDead ? '<p class="text-[10px] mt-1 animate-bounce text-white font-black">!! ESCAPE NOW !!</p>' : ''}
                    </div>`;
                } else {
                    let cap = parseFloat(document.getElementById('capitalInput').value) || 0;
                    if (cap > 0 && isUp) {
                        let buy = Math.floor((cap * 0.02) / (s.price * s.actual_sl/100));
                        posHtml = `<button onclick="event.stopPropagation(); openTradeModal('${s.symbol}', ${s.price})" class="pixel-btn w-full mt-4 py-2 text-[10px] bg-red-600">RECRUIT (買進 ${buy})</button>`;
                    } else if (!isUp) {
                        posHtml = `<div class="mt-4 border-2 border-green-900 bg-green-900/20 p-2 text-center text-[10px] text-green-400">!! POISONED ZONE !!</div>`;
                    }
                }

                card.className = "pixel-card p-6 flex flex-col gap-4 cursor-pointer";
                card.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] text-slate-500">
                        <span>CLASS: ${s.category}</span>
                        <span>ID: ${s.symbol}</span>
                    </div>
                    <div class="border-2 p-3 ${isUp ? 'border-red-500 bg-red-900/20' : 'border-green-500 bg-green-900/20'}">
                        <h2 class="text-2xl font-black">${s.name}</h2>
                        <p class="text-[10px] mt-1">${isUp ? 'LEVEL UP! 🚀' : 'POISONED! 🚨'}</p>
                    </div>
                    <div class="flex justify-between items-baseline">
                        <span class="text-5xl font-black">${s.price}</span>
                        <div class="text-right"><p class="text-[10px] text-slate-500">HP (RSI)</p><p class="text-2xl">${s.rsi}</p></div>
                    </div>
                    ${posHtml}
                    <div class="pixel-dialog mt-2">
                        <p class="text-[10px] text-blue-300 mb-1">ATU ADVICE:</p>
                        <p class="text-[11px] leading-relaxed">${s.ai_summary}</p>
                    </div>
                    <div class="mt-auto flex justify-between text-[10px] text-slate-500 pt-4">
                        <span>WIN: ${s.win_rate}%</span>
                        <span>EV: ${s.ev}%</span>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function triggerGitHubAction() {
            let token = localStorage.getItem('atu_github_token');
            if (!token) {
                token = prompt("PASSKEY (Personal Access Token):");
                if (!token) return; 
                localStorage.setItem('atu_github_token', token);
            }
            const btn = document.getElementById('forceUpdateBtn');
            const original = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `LOADING...`;
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_FILENAME}/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: 'main' }) 
                });
                if (res.ok) {
                    let c = 50;
                    const t = setInterval(() => {
                        c--; btn.innerHTML = `AI THINKING... ${c}s`;
                        if (c <= 0) { clearInterval(t); btn.disabled = false; btn.innerHTML = original; loadData(true); }
                    }, 1000);
                } else { alert("TOKEN ERROR"); localStorage.removeItem('atu_github_token'); btn.disabled = false; btn.innerHTML = original; }
            } catch (e) { btn.disabled = false; btn.innerHTML = original; }
        }

        const GITHUB_OWNER = "meifengasst"; 
        const GITHUB_REPO = "market-monitor";    
        const WORKFLOW_FILENAME = "main.yml"; 

        function openModal(s) {
            document.getElementById('dataModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('dataModal').classList.add('opacity-100'), 10);
            document.getElementById('modalTitle').innerText = `▶ ${s.name} STATUS`;
            let h = s.history;
            const l = h.map(x => x.date);
            const ctxP = document.getElementById('historyChart').getContext('2d');
            if(priceChart) priceChart.destroy();
            priceChart = new Chart(ctxP, { type: 'line', data: { labels: l, datasets: [{ label: 'PRICE', data: h.map(x => x.price), borderColor: '#fff', borderWidth: 2, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#334155' } } } } });
        }
        function closeModal(id) { document.getElementById(id).classList.remove('opacity-100'); setTimeout(() => document.getElementById(id).classList.add('hidden'), 300); }
        function openTradeModal(s, p) {
            document.getElementById('tradeModal').classList.remove('hidden');
            document.getElementById('tradeSymbol').innerText = s;
            document.getElementById('tradePrice').value = p;
            setTimeout(() => document.getElementById('tradeModal').classList.add('opacity-100'), 10);
        }
        function closeTradeModal() { document.getElementById('tradeModal').classList.remove('opacity-100'); setTimeout(() => document.getElementById('tradeModal').classList.add('hidden'), 300); }
        function saveTrade() {
            let s = document.getElementById('tradeSymbol').innerText;
            let p = parseFloat(document.getElementById('tradePrice').value);
            let q = parseInt(document.getElementById('tradeShares').value);
            if(p > 0 && q > 0) {
                myPortfolio[s] = { entryPrice: p, shares: q, peakPrice: p };
                localStorage.setItem('atu_portfolio', JSON.stringify(myPortfolio));
                closeTradeModal(); loadData();
            }
        }
    </script>
</body>
</html>
