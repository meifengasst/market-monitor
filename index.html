<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿土伯投資儀表板 - 雲端實戰版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen relative overflow-x-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-900 transition-opacity duration-500">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🕵️‍♂️</div>
            <h1 class="text-4xl font-black text-blue-400 tracking-widest">阿土伯戰情室</h1>
            <p class="text-slate-500 mt-2 font-bold tracking-widest">PRIVATE VAULT</p>
        </div>
        <div class="bg-slate-800/80 p-8 rounded-[2rem] border border-slate-700 shadow-2xl flex flex-col items-center backdrop-blur-sm w-11/12 max-w-sm">
            <p class="text-slate-400 mb-4 font-bold text-sm">請輸入通關密碼</p>
            <input type="password" id="passInput" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-5 py-4 text-center text-2xl tracking-[0.5em] focus:outline-none focus:border-blue-500 mb-6 text-white" placeholder="••••">
            <button onclick="checkPassword()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-colors shadow-[0_0_15px_rgba(37,99,235,0.4)]">解鎖進入</button>
            <p id="errorMsg" class="text-red-400 font-bold mt-4 opacity-0 text-sm">❌ 密碼錯誤，請重試！</p>
        </div>
    </div>

    <div id="dashboardContent" class="hidden p-4 md:p-6 w-full max-w-[1800px] mx-auto flex-col xl:flex-row gap-6 xl:gap-8 opacity-0 transition-opacity duration-700">
        
        <aside class="w-full xl:w-[350px] xl:sticky xl:top-6 h-[calc(100vh-3rem)] overflow-y-auto bg-slate-800/60 backdrop-blur-md rounded-[2rem] border border-slate-700 shadow-2xl p-6 flex-shrink-0 custom-scrollbar">
            <div id="portfolioSummarySection" class="mb-8 hidden">
                <h2 class="text-2xl font-black text-green-400 mb-4 flex items-center gap-2 border-b border-slate-700 pb-3"><span>💼</span> 目前實戰庫存</h2>
                <div id="portfolioList" class="flex flex-col gap-3"></div>
                <div class="mt-4 pt-3 border-t border-slate-700 flex justify-between items-end">
                    <p class="text-sm text-slate-400 font-bold mb-1">未實現總損益</p>
                    <p id="totalPnL" class="text-3xl font-mono font-black text-white">$0</p>
                </div>
            </div>
            <button onclick="openRulesModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 rounded-2xl py-4 px-5 flex items-center justify-between transition-all group mt-4">
                <div class="flex items-center gap-3"><span class="text-2xl group-hover:animate-bounce">💡</span><div class="text-left"><p class="font-black text-blue-400 text-sm tracking-widest mb-0.5">阿土伯實戰心法</p><p class="text-xs text-slate-400 font-bold">鐵律與術語翻譯</p></div></div><span class="text-slate-500 font-black text-xl">👉</span>
            </button>
        </aside>

        <main class="flex-1 w-full min-w-0">
            <header class="mb-6 flex flex-col md:flex-row md:items-end justify-between border-b border-slate-700 pb-4">
                <div>
                    <h1 class="text-4xl font-black text-blue-400 tracking-tight">📈 阿土伯多空戰情室</h1>
                    <div class="flex items-center gap-4 mt-2">
                        <p class="text-slate-400 text-base font-bold">最後更新：<span id="update-time" class="text-white">讀取中...</span></p>
                        <button id="forceUpdateBtn" onclick="triggerGitHubAction()" class="bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/50 px-3 py-1.5 rounded-lg text-xs font-black transition-colors flex items-center gap-1.5 shadow-[0_0_10px_rgba(37,99,235,0.2)]">🔄 點我強制更新</button>
                    </div>
                </div>
                <div class="mt-4 md:mt-0 flex flex-col md:flex-row gap-3 w-full md:w-auto items-center">
                    <div class="relative w-full md:w-56">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-green-400 text-lg">💰</span>
                        <input type="number" id="capitalInput" placeholder="總本金" value="100000" class="w-full bg-slate-900 border-2 border-slate-600 rounded-xl py-3 pl-12 pr-4 text-base focus:border-green-500 text-green-400 font-black">
                    </div>
                    <input type="text" id="searchInput" placeholder="🔍 搜尋..." class="w-full md:w-72 bg-slate-800 border border-slate-600 rounded-xl px-5 py-3 text-base focus:border-blue-500">
                </div>
            </header>

            <div class="mb-8 bg-slate-800/80 border border-slate-600 rounded-[2rem] p-6 lg:p-8 shadow-2xl relative overflow-hidden backdrop-blur-md">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-blue-500 to-purple-500"></div>
                <div class="flex flex-col lg:flex-row gap-8">
                    <div class="w-full lg:w-1/3 border-b lg:border-b-0 lg:border-r border-slate-700 pb-6 lg:pb-0 lg:pr-8">
                        <div class="flex items-center gap-2 mb-5"><span class="text-3xl animate-pulse">🦅</span><h3 class="text-blue-400 font-black tracking-widest text-lg">昨夜美股戰報</h3></div>
                        <div id="us-market-grid" class="grid grid-cols-2 gap-3 mb-5"></div>
                    </div>
                    <div class="w-full lg:w-2/3 flex flex-col justify-center">
                        <div class="flex items-center gap-2 mb-4"><span class="text-2xl">🧠</span><h3 class="text-purple-400 font-black tracking-widest text-lg">阿土伯 AI 開盤劇本</h3></div>
                        <div class="bg-black/40 p-6 rounded-2xl border border-white/5"><p id="ai-script-text" class="text-slate-300 text-lg md:text-xl font-bold leading-relaxed flex items-center min-h-[80px]">數據連線中...</p></div>
                    </div>
                </div>
            </div>
            <div id="stock-list" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <div id="dataModal" onclick="if(event.target === this) closeModal('dataModal')" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 cursor-pointer">
        <div class="bg-slate-800 rounded-3xl w-full max-w-6xl border border-slate-600 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[95vh] cursor-auto" id="modalContent">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50 rounded-t-3xl shrink-0">
                <div><h3 class="text-3xl font-black text-white" id="modalTitle">股票名稱</h3><p class="text-slate-400 text-base mt-1">成本線與技術指標分析</p></div>
                <button onclick="closeModal('dataModal')" class="text-slate-400 hover:text-red-500 text-4xl font-black">&times;</button>
            </div>
            <div class="p-6 bg-slate-900 rounded-b-3xl overflow-y-auto flex-grow custom-scrollbar">
                <div class="h-[350px] mb-4 relative"><span class="absolute top-0 left-0 text-slate-500 text-xs font-bold z-10">價格與我的成本</span><canvas id="historyChart"></canvas></div>
                <div class="h-[120px] mb-4 relative"><canvas id="macdChart"></canvas></div>
                <div class="h-[100px] relative"><canvas id="rsiChart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="tradeModal" onclick="if(event.target === this) closeTradeModal()" class="fixed inset-0 bg-black/90 hidden z-[70] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 cursor-pointer">
        <div class="bg-slate-800 rounded-3xl w-full max-w-sm border border-slate-600 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col cursor-auto p-6" id="tradeModalContent">
            <h3 class="text-2xl font-black text-blue-400 mb-4">💼 紀錄實戰部位</h3>
            <div class="mb-4"><label class="block text-slate-500 text-xs font-bold mb-2">成交均價</label><input type="number" id="tradePrice" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white font-mono font-black focus:border-blue-500"></div>
            <div class="mb-6"><label class="block text-slate-500 text-xs font-bold mb-2">總股數</label><input type="number" id="tradeShares" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white font-mono font-black focus:border-blue-500"></div>
            <div class="flex gap-3"><button onclick="saveTrade()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-lg">💾 儲存同步</button><button onclick="closeTradeModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-black py-3 rounded-xl">取消</button></div>
        </div>
    </div>

    <script>
        // --- ⚙️ 設定區 ---
        const GITHUB_OWNER = "meifengasst"; 
        const GITHUB_REPO = "market-monitor";    
        const WORKFLOW_FILENAME = "main.yml"; 
        const SECRET_PASSWORD = "29399909"; 

        let rawData = [];
        let stockMap = {}; 
        let priceChart = null, rsiChart = null, macdChart = null;
        let myPortfolio = JSON.parse(localStorage.getItem('atu_portfolio')) || {};

        // 1. 登入 (已修正邏輯)
        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if (input === SECRET_PASSWORD) {
                document.getElementById('loginScreen').classList.add('opacity-0');
                setTimeout(() => { 
                    document.getElementById('loginScreen').classList.add('hidden'); 
                    document.getElementById('dashboardContent').classList.remove('hidden'); 
                    document.getElementById('dashboardContent').classList.add('flex'); 
                    setTimeout(() => document.getElementById('dashboardContent').classList.remove('opacity-0'), 50); 
                    loadData(); 
                }, 500);
            } else {
                document.getElementById('errorMsg').classList.remove('opacity-0');
                document.getElementById('passInput').value = "";
                setTimeout(() => document.getElementById('errorMsg').classList.add('opacity-0'), 2000);
            }
        }
        document.getElementById("passInput").addEventListener("keypress", (e) => { if (e.key === "Enter") checkPassword(); });

        // 2. 資料同步與讀取
        async function syncPortfolioToGithub() {
            const token = localStorage.getItem('atu_github_token');
            if (!token) { alert("🕵️‍♂️ 請先設定 GitHub Token (點擊強制更新按鈕)"); return; }
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/portfolio.json`;
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                let sha = getRes.ok ? (await getRes.json()).sha : "";
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `🤖 Sync: ${new Date().toLocaleString()}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(myPortfolio, null, 4)))),
                        sha: sha
                    })
                });
                if (putRes.ok) triggerGitHubAction();
            } catch (e) { console.error(e); }
        }

        function loadData() {
            fetch('data.json?t=' + Date.now()).then(res => res.json()).then(json => {
                rawData = json.data;
                rawData.forEach(s => stockMap[s.symbol] = s);
                document.getElementById('update-time').innerText = json.last_update;
                if(json.market_health) {
                    document.getElementById('health-score').innerText = `${json.market_health.health_pct}%`;
                    document.getElementById('health-bar').style.width = `${json.market_health.health_pct}%`;
                    document.getElementById('ai-script-text').innerText = json.market_health.ai_script;
                    
                    let usGrid = document.getElementById('us-market-grid');
                    usGrid.innerHTML = '';
                    for (let k in json.market_health.us_summary) {
                        let item = json.market_health.us_summary[k];
                        let color = item.pct > 0 ? 'text-red-400' : 'text-green-400';
                        usGrid.innerHTML += `<div class="p-3 bg-slate-800 rounded-xl border border-white/5">
                            <p class="text-xs text-slate-500 font-bold">${k}</p>
                            <p class="text-lg font-mono font-black ${color}">${item.pct}%</p>
                        </div>`;
                    }
                }
                renderData();
                renderPortfolioSummary();
            }).catch(e => console.log("Waiting for data..."));
        }

        // 3. 渲染功能
        function renderData(filter = '') {
            const list = document.getElementById('stock-list');
            list.innerHTML = '';
            const search = (filter || document.getElementById('searchInput').value).toLowerCase();
            
            rawData.filter(s => s.symbol.toLowerCase().includes(search) || s.name.toLowerCase().includes(search)).forEach(stock => {
                const ma20 = stock.history[stock.history.length-1].ma20;
                const card = document.createElement('div');
                card.onclick = () => openModal(stock);
                card.className = "p-6 rounded-[2rem] border-2 border-slate-700 bg-slate-800/50 cursor-pointer hover:-translate-y-1 transition-all";
                
                let myPos = "";
                if (myPortfolio[stock.symbol]) {
                    const trade = myPortfolio[stock.symbol];
                    const pnl = (stock.price - trade.entryPrice) * trade.shares;
                    myPos = `<div class="mt-4 p-4 bg-blue-900/20 border border-blue-500/30 rounded-2xl">
                        <div class="flex justify-between text-xs text-blue-300 font-bold mb-2"><span>實戰部位</span><span>${trade.shares}股</span></div>
                        <p class="text-xl font-mono font-black ${pnl >= 0 ? 'text-red-400' : 'text-green-400'}">${pnl >= 0 ? '+' : ''}${Math.round(pnl).toLocaleString()}</p>
                    </div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between mb-4"><span class="text-xs font-bold text-slate-500">${stock.category}</span><span class="text-xs font-mono text-slate-600">${stock.symbol}</span></div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-black">${stock.name}</h2>
                        <span class="text-xs px-2 py-1 rounded bg-black/30">${stock.price > ma20 ? '🚀 站上月線' : '🚨 跌破月線'}</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <p class="text-5xl font-mono font-black">${stock.price}</p>
                        <div class="text-right"><p class="text-xs text-slate-500">RSI</p><p class="text-xl font-mono font-black text-purple-400">${stock.rsi}</p></div>
                    </div>
                    ${myPos}`;
                list.appendChild(card);
            });
        }

        function renderPortfolioSummary() {
            const list = document.getElementById('portfolioList');
            list.innerHTML = '';
            let total = 0;
            for (let s in myPortfolio) {
                const trade = myPortfolio[s];
                const stock = stockMap[s];
                const current = stock ? stock.price : trade.entryPrice;
                const pnl = (current - trade.entryPrice) * trade.shares;
                total += pnl;
                list.innerHTML += `<div class="p-4 bg-black/30 rounded-2xl border border-white/5 flex justify-between items-center">
                    <div><p class="font-bold">${stock ? stock.name : s}</p><p class="text-xs text-yellow-400">成本: $${trade.entryPrice}</p></div>
                    <p class="font-mono font-black ${pnl >= 0 ? 'text-red-400' : 'text-green-400'}">${pnl >= 0 ? '+' : ''}${Math.round(pnl)}</p>
                </div>`;
            }
            document.getElementById('totalPnL').innerText = `$${Math.round(total).toLocaleString()}`;
            document.getElementById('totalPnL').className = `text-3xl font-mono font-black ${total >= 0 ? 'text-red-400' : 'text-green-400'}`;
            document.getElementById('portfolioSummarySection').classList.toggle('hidden', Object.keys(myPortfolio).length === 0);
        }

        // 4. 圖表功能 (已修復重複代碼與成本線)
        function openModal(stock) {
            document.getElementById('dataModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('dataModal').classList.remove('opacity-0'); document.getElementById('modalContent').classList.remove('scale-95'); }, 10);
            document.getElementById('modalTitle').innerText = `${stock.name} (${stock.symbol})`;
            
            const history = stock.history || [];
            const labels = history.map(h => h.date);
            const prices = history.map(h => h.price);
            let datasets = [{ label: '收盤價', data: prices, borderColor: '#ffffff', borderWidth: 2, pointRadius: 1, yAxisID: 'y' }];

            if (myPortfolio[stock.symbol]) {
                const cost = myPortfolio[stock.symbol].entryPrice;
                datasets.push({ label: `我的成本 ($${cost})`, data: new Array(labels.length).fill(cost), borderColor: '#facc15', borderWidth: 2, borderDash: [5, 5], pointRadius: 0 });
            }

            if(priceChart) priceChart.destroy();
            priceChart = new Chart(document.getElementById('historyChart').getContext('2d'), {
                type: 'line', data: { labels: labels, datasets: datasets },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { display: false } } }
            });
        }

        // 5. 其他功能
        function saveTrade() {
            const sym = document.getElementById('tradeSymbol').innerText;
            const price = parseFloat(document.getElementById('tradePrice').value);
            const shares = parseInt(document.getElementById('tradeShares').value);
            if (price > 0 && shares > 0) {
                myPortfolio[sym] = { entryPrice: price, shares: shares, peakPrice: price };
                localStorage.setItem('atu_portfolio', JSON.stringify(myPortfolio));
                closeTradeModal(); renderPortfolioSummary(); syncPortfolioToGithub();
            }
        }
        function closeTradeModal() { document.getElementById('tradeModal').classList.add('opacity-0'); setTimeout(() => document.getElementById('tradeModal').classList.add('hidden'), 300); }
        function closeModal(id) { document.getElementById(id).classList.add('opacity-0'); setTimeout(() => document.getElementById(id).classList.add('hidden'), 300); }
        async function triggerGitHubAction() {
            let token = localStorage.getItem('atu_github_token');
            if (!token) { token = prompt("GitHub Token:"); if (token) localStorage.setItem('atu_github_token', token); }
            const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_FILENAME}/dispatches`, {
                method: 'POST', headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ ref: 'main' })
            });
            if (res.ok) alert("🚀 AI 引擎已啟動！請稍候 60 秒。");
        }
        document.getElementById('searchInput').addEventListener('input', () => renderData());
        setInterval(() => loadData(), 60000);
    </script>
</body>
</html>
