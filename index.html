<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿土伯投資儀表板 - WBC 賽事監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">📈 阿土伯多空戰情室</h1>
                <p class="text-slate-400 mt-2">最後更新：<span id="update-time">讀取中...</span></p>
            </div>
            
            <div class="mt-4 md:mt-0 flex gap-2">
                <input type="text" id="searchInput" placeholder="搜尋代號或名稱..." 
                       class="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                <select id="filterTrend" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2">
                    <option value="all">所有趨勢</option>
                    <option value="多頭">只看多頭</option>
                    <option value="空頭">只看空頭</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-800 p-4 rounded-lg text-center border-b-4 border-blue-500">
                <p class="text-slate-400 text-sm">監控總數</p>
                <p id="total-count" class="text-2xl font-bold">-</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg text-center border-b-4 border-red-500">
                <p class="text-slate-400 text-sm">多頭標的</p>
                <p id="bull-count" class="text-2xl font-bold">-</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg text-center border-b-4 border-green-500">
                <p class="text-slate-400 text-sm">空頭避險</p>
                <p id="bear-count" class="text-2xl font-bold">-</p>
            </div>
        </div>

        <div id="stock-list" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
            </div>
    </div>

    <script>
        let rawData = [];

        function renderData(filterText = '') {
    const list = document.getElementById('stock-list');
    list.innerHTML = '';
    const search = filterText.toLowerCase();

    const filtered = rawData.filter(item => {
        return item.name.toLowerCase().includes(search) || 
               item.symbol.toLowerCase().includes(search) || 
               item.category.toLowerCase().includes(search);
    });

    filtered.forEach(stock => {
        const card = document.createElement('div');
        // 增加點擊事件，直接帶出新聞搜尋
        card.onclick = () => window.open(`https://www.google.com/search?q=${stock.name}+股價+新聞+分析`, '_blank');
        
        card.className = "bg-slate-800 p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-400 cursor-pointer transition-all shadow-2xl transform hover:-translate-y-1";
        
        // 強化燈號顯示邏輯
        const shortLight = stock.lights.short !== '⚪' ? 'text-red-500 shadow-[0_0_10px_#ef4444] font-black' : 'text-slate-600 opacity-30';
        const midLight = stock.lights.mid !== '⚪' ? 'text-yellow-400 shadow-[0_0_10px_#facc15] font-black' : 'text-slate-600 opacity-30';
        const longLight = stock.lights.long !== '⚪' ? 'text-green-500 shadow-[0_0_10px_#22c55e] font-black' : 'text-slate-600 opacity-30';

        card.innerHTML = `
            <div class="flex justify-between items-center mb-4">
                <span class="bg-blue-600 text-white text-xs px-3 py-1 rounded-full font-bold tracking-widest">${stock.category}</span>
                <div class="flex gap-2 text-xl">
                    <span class="${shortLight}">🔴</span>
                    <span class="${midLight}">🟡</span>
                    <span class="${longLight}">🟢</span>
                </div>
            </div>
            
            <h2 class="text-3xl font-black mb-1">${stock.name}</h2>
            <p class="text-slate-500 text-sm font-mono mb-4">${stock.symbol}</p>

            <div class="flex justify-between items-end bg-slate-900/50 p-4 rounded-xl">
                <div>
                    <p class="text-5xl font-mono font-black tracking-tighter text-white">${stock.price}</p>
                    <p class="text-sm font-bold text-yellow-500 mt-2">🚦 老司機點評：${stock.status}</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-500 font-bold">熱度 (RSI)</p>
                    <p class="text-2xl font-mono font-black ${stock.rsi > 70 ? 'text-red-500' : 'text-green-400'}">${stock.rsi}</p>
                </div>
            </div>

            <div class="mt-6 grid grid-cols-3 gap-2 text-center">
                <div class="flex flex-col items-center">
                    <div class="text-[10px] text-slate-500 mb-1">近期</div>
                    <div class="text-xs font-bold ${shortLight.includes('shadow') ? 'text-red-400' : 'text-slate-600'}">起步加速</div>
                </div>
                <div class="flex flex-col items-center border-x border-slate-700">
                    <div class="text-[10px] text-slate-500 mb-1">中期</div>
                    <div class="text-xs font-bold ${midLight.includes('shadow') ? 'text-yellow-400' : 'text-slate-600'}">路況順暢</div>
                </div>
                <div class="flex flex-col items-center">
                    <div class="text-[10px] text-slate-500 mb-1">長期</div>
                    <div class="text-xs font-bold ${longLight.includes('shadow') ? 'text-green-400' : 'text-slate-600'}">地基穩固</div>
                </div>
            </div>
            
            <p class="text-[10px] text-center text-slate-600 mt-4 italic">💡 點擊卡片查看最新國內外新聞</p>
        `;
        list.appendChild(card);
    });
}

        fetch('data.json')
            .then(res => res.json())
            .then(json => {
                rawData = json.data;
                document.getElementById('update-time').innerText = json.last_update;
                document.getElementById('total-count').innerText = rawData.length;
                document.getElementById('bull-count').innerText = rawData.filter(i => i.trend === '多頭').length;
                document.getElementById('bear-count').innerText = rawData.filter(i => i.trend === '空頭').length;
                renderData();
            });

        // 監聽搜尋與過濾
        document.getElementById('searchInput').addEventListener('input', (e) => renderData(e.target.value, document.getElementById('filterTrend').value));
        document.getElementById('filterTrend').addEventListener('change', (e) => renderData(document.getElementById('searchInput').value, e.target.value));
    </script>
</body>
</html>
