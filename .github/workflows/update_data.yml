name: 🚀 阿土伯戰情室自動更新大腦

on:
  schedule:
    # 這裡用的是 UTC 時間。UTC 06:45 = 台灣時間 14:45。 
    # 1-5 代表週一到週五開盤日。
    - cron: '45 6 * * 1-5'
  workflow_dispatch: # 這個咒語會讓你的 GitHub 網頁上多出一個「手動執行」按鈕

jobs:
  run-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許管家把更新後的 data.json 存回倉庫

    steps:
    - name: 📥 下載你的程式碼
      uses: actions/checkout@v3

    - name: 🐍 安裝 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 使用穩定的 Python 版本

    - name: 📦 安裝必備套件 (Dependencies)
      run: |
        python -m pip install --upgrade pip
        # ⚠️ 這裡請換成你 analyze.py 實際有用到的套件！
        # 如果你有 requirements.txt，可以直接寫： pip install -r requirements.txt
        pip install requests pandas yfinance ta 

    - name: 🧠 執行阿土伯量化大腦 (analyze.py)
      run: python analyze.py

    - name: 💾 把最新的 data.json 存回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data.json
        # 檢查檔案有沒有變更，有變更才 Commit 和 Push
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新台股收盤戰報 (data.json)" && git push)
