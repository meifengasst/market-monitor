name: Market-AI-Bot

on:
  schedule:
    # 這裡設定 UTC 時間，例如每天早上 00:00 (台北時間 08:00) 執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 這讓你可以在 GitHub 網頁上手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
# 在 main.yml 的步驟中加入安裝指令
      - name: 安裝必要套件
        run: |
          pip install yfinance pandas

      - name: 執行分析腳本
        run: python analyze.py

      - name: 將更新後的數據推回 GitHub
        run: |
          git config --global user.name "Market-Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "自動更新股市情緒數據: $(date)"
          git push
