name: Market-AI-Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 確保抓取完整歷史

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install yfinance pandas

      - name: 執行分析腳本
        run: python analyze.py

      - name: 將更新後的數據推回 GitHub
        run: |
          git config --global user.name "Market-Bot"
          git config --global user.email "bot@github.com"
          
          # 解決衝突的關鍵：先暫存資料，拉取後再放回來
          git add data.json
          git stash 
          git pull --rebase origin main
          git stash pop || echo "No stash to pop"
          
          git add data.json
          git commit -m "自動更新股市情緒數據: $(date)" || exit 0
          git push origin main
