name: 🚀 阿土伯盤中戰情室 (15分鐘自動更新)

on:
  schedule:
    # 💡 1-5 負責台股, 13-21 負責美股 (錯開整點防塞車)
    - cron: '7,22,37,52 1-5,13-21 * * 1-5' 
  workflow_dispatch: # 手動執行按鈕

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 1. 下載專案程式碼
        uses: actions/checkout@v3

      - name: 🐍 2. 設定 Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 3. 讀取清單安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧠 4. 執行阿土伯量化大腦
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }} # 美股報價鑰匙
          TZ: Asia/Taipei # 強制台灣時區
        run: python analyze.py

      - name: 💾 5. 將最新戰報存檔推送到網頁
        # 🚨 注意看這裡，整個步驟只有一個 run: 和一條直線 |
        run: |
          git config --global user.name "股市阿土伯機器人"
          git config --global user.email "actions@github.com"
          git add *.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新盤中報價與停損警報" && git push)
