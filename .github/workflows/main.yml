name: Market-AI-Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install yfinance pandas google-generativeai # <--- 新增 google-generativeai

      - name: 執行分析腳本
        env: 
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }} 
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # <--- 新增這把鑰匙
        run: python analyze.py

      - name: 將數據存入私有資料庫並推回 GitHub
        run: |
          git config --global user.name "Market-Bot"
          git config --global user.email "bot@github.com"
          
          # 一次性把 JSON 和 CSV 都加進去
          git add data.json chip_history.csv
          git stash 
          git pull --rebase origin main
          git stash pop || echo "No stash to pop"
          
          git add data.json chip_history.csv
          git commit -m "自動更新大戶籌碼與情緒數據: $(date)" || exit 0
          git push origin main
