name: 阿土伯戰情室自動更新

# 設定什麼時候要觸發機器人執行
on:
  schedule:
    # 這是 UTC 時間 (台灣時間減 8 小時)。
    # '*/30 1-5 * * 1-5' 代表：星期一到五，台灣時間早上 9:00 到 下午 1:59，每 30 分鐘自動跑一次！
    - cron: '*/30 1-5 * * 1-5' 
  workflow_dispatch: # 保留手動按鈕

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下載你的專案程式碼
        uses: actions/checkout@v3

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安裝必備套件 (yfinance, pandas 等)
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      - name: 🚀 執行阿土伯分析核心 (analyze.py)
        # 如果你之前有設定環境變數 (API Key)，需要像下面這樣帶入
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
        run: python analyze.py

      - name: 💾 將最新的 data.json 存檔並推送到網頁
        run: |
          git config --global user.name "股市阿土伯機器人"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "🤖 自動更新盤中報價與期望值" || exit 0
          git push
