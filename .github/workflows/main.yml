name: 🚀 阿土伯盤中戰情室 (15分鐘自動更新)

on:
  schedule:
    # 💡 1-5 負責台股, 13-21 負責美股 (錯開整點防塞車)
    - cron: '7,22,37,52 1-5,13-21 * * 1-5' 
  workflow_dispatch: # 手動執行按鈕

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance feedparser pandas requests

      - name: Run analyze.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
        run: python analyze.py

      - name: Commit and push changes
        run: |
          git config --global user.name "股市阿土伯機器人"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "🤖 自動更新" || echo "No changes to commit"
          git pull origin main --rebase
          git push
