name: 阿土伯戰情室自動更新

on:
  schedule:
    # 每天台股與美股收盤後各跑一次 (一到五)
    - cron: '0 6,22 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 💡 阿土伯黑科技：快取套件，加速執行！

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance feedparser pandas requests

      - name: Run analyze.py
        env:
          TZ: Asia/Taipei
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python analyze.py

      - name: Commit and push changes
        run: |
          git config --global user.name "股市阿土伯機器人"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "🤖 自動更新盤中報價與帳務" || echo "No changes to commit"
          git pull origin main --no-rebase -s recursive -X ours
          git push
