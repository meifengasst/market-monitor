name: 🚀 阿土伯盤中戰情室 (15分鐘自動更新)

on:
  schedule:
    # 💡 阿土伯修正：把 1-5 改成明確的 1,2,3,4,5，這在 GitHub 系統裡最穩，絕對不會睡死！
    - cron: '*/15 1,2,3,4,5 * * 1-5' 
  workflow_dispatch: # 手動執行按鈕

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 1. 下載專案程式碼
        uses: actions/checkout@v3

      - name: 🐍 2. 設定 Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 3. 讀取清單安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧠 4. 執行阿土伯量化大腦
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          # 🌟 阿土伯時區魔法：強制讓雲端主機變成台灣時間，這樣網頁的「最後更新」才會準！
          TZ: Asia/Taipei 
        run: python analyze.py

      - name: 💾 5. 將最新戰報存檔推送到網頁
        run: |
          git config --global user.name "股市阿土伯機器人"
          git config --global user.email "actions@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新盤中報價與期望值" && git push)
